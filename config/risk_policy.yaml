# Risk Policy — Immortalize Labs HF
# Single source of truth. Consumed by RiskGuardian, drawdown monitor, risk reporter.
# Last updated: 2026-03-12

# ── Signal Validation Gate ─────────────────────────────────────────────────────
signal_validation:
  min_passing_signals: 3
  min_abs_ic: 0.01
  max_permutation_pvalue: 0.05
  max_stability_delta: 0.02

# ── Backtest Gate ──────────────────────────────────────────────────────────────
backtest:
  min_oos_sharpe: 0.5
  min_oos_days: 30
  min_decay_ratio: 0.3        # OOS/IS
  max_drawdown_pct: 5.0
  min_trades: 50
  min_calmar: 1.0
  max_daily_turnover: 10.0

# ── Paper → Live Gate ──────────────────────────────────────────────────────────
paper_to_live:
  max_slippage_delta_bps: 2.0
  min_fill_rate_pct: 80
  max_risk_incidents: 0
  min_paper_days: 7

# ── Live Trading Limits (consumed by RiskGuardian) ─────────────────────────────
live:
  max_position_usd: 500.0
  max_exposure_usd: 2000.0
  max_daily_loss_usd: 50.0
  max_drawdown_pct: 2.0
  max_open_orders: 8
  max_loss_per_trade_bps: 50.0
  max_hold_sec: 14400           # 4 hours

# ── Kill Switch / Adverse Selection ────────────────────────────────────────────
kill_switch:
  adverse_window: 10            # rolling trade window
  adverse_min_wr: 0.20          # min win rate before pause

# ── Regime Scaling ─────────────────────────────────────────────────────────────
regime:
  vol_low: 30.0                 # annualized vol % — full size
  vol_high: 100.0               # annualized vol % — 25% size

# ── Execution Defaults ─────────────────────────────────────────────────────────
execution:
  maker_cost_bps: -1.0          # rebate
  taker_cost_bps: 5.0
  size_per_symbol_usd: 500.0
  entry_z_score: 1.8
  exit_z_score: 0.36
  min_hold_sec: 3600            # 60 min

# ── Drawdown Monitor (portfolio-level circuit breaker) ─────────────────────────
drawdown_monitor:
  poll_interval_s: 30
  portfolio_max_daily_loss_usd: 50.0
  portfolio_max_drawdown_pct: 2.0
  per_strategy_max_daily_loss_usd: 30.0
  kill_file: "data/RISK_KILL"

# ── Daily Reset ────────────────────────────────────────────────────────────────
daily_reset:
  timezone: "UTC"               # crypto settles on UTC
  hour: 0                       # midnight
